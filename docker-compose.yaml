networks:
  monitoring_network:
    driver: bridge
    name: devops-monitoring-network

services:
  prom-http-simulator:
    image: pierrevincent/prom-http-simulator:${SIMULATOR_VERSION}
    container_name: devops-http-simulator
    ports:
      - "${SIMULATOR_PORT}:8080"
    networks:
      - monitoring_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "-O-", "http://localhost:8080/metrics"]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    container_name: devops-prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-remote-write-receiver'
    networks:
      - monitoring_network
    restart: unless-stopped

    healthcheck:
      test:
        [
        "CMD",
        "wget",
        "-q", 
        "--tries=1", 
        "-O-", 
        "http://localhost:9090/-/healthy"
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana-alloy:
    image: grafana/alloy:${ALLOY_VERSION}
    container_name: devops-alloy
    ports:
      - "${ALLOY_PORT}:12345"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
    command:  
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    networks:
      - monitoring_network
    restart: unless-stopped
    depends_on:
      prom-http-simulator:
        condition: service_healthy

      prometheus:
        condition: service_healthy
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION}
    container_name: devops-grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring_network
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy

    healthcheck:
      test: 
        ["CMD", 
        "wget", 
        "-q", 
        "--tries=1", 
        "-O-", 
        "http://localhost:3000/api/health"
        ]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  prometheus_data:
    name: devops-prometheus-data
    driver: local

  grafana_data:
    name: devops-grafana-data
    driver: local